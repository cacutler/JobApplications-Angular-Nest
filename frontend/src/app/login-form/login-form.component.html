<form (ngSubmit)="onSubmit()" id="login-form">
    <label for="email">Email</label>
    <input type="email" [(ngModel)]="email" name="email" id="email" required>
    <label for="password">Password</label>
    <input type="password" [(ngModel)]="password" name="password" id="password" required>
    <p class="error" *ngIf="error">{{error}}</p>
    <button type="submit">Log In</button>
    <a routerLink="/register">Go to Sign Up Page</a>
</form>
