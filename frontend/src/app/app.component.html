<main class="main">
    <h1>Job Tracker</h1>
    <form *ngIf="isLoggedIn$ | async" (ngSubmit)="onSubmit()">
        <button type="submit" (click)="onSubmit()">Logout</button>
    </form>
    <nav *ngIf="!(isLoggedIn$ | async)">
        <a routerLink="/login">Login</a>
        <a routerLink="/register">Sign Up</a>
    </nav>
</main>
<router-outlet/>
