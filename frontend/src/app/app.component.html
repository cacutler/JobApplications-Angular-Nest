<main class="main">
    <h1>{{title}}</h1>
    <button id="logout" *ngIf="isLoggedIn$ | async" (click)="onSubmit()">Logout</button>
    <nav *ngIf="!(isLoggedIn$ | async)">
        <div class="guest-links">
            <a routerLink="/login">Login</a>
            <a routerLink="/register">Sign Up</a>
        </div>
    </nav>
</main>
<router-outlet/>
