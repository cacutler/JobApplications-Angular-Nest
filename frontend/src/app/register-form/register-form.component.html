<h2>Create an Account</h2>
<form (ngSubmit)="onSubmit()" id="register-form">
    <label for="name">Name</label>
    <input type="text" name="name" id="name" [(ngModel)]="name" placeholder="Enter your name" required>
    <label for="username">Username</label>
    <input type="text" name="username" id="username" [(ngModel)]="username" placeholder="Enter your username" required>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" [(ngModel)]="email" placeholder="Enter your email" required>
    <label for="password">Password</label>
    <input type="password" name="password" id="password" [(ngModel)]="password" placeholder="Enter a password (minimum of 8 characters)" required minlength="8">
    <p class="error" *ngIf="error">{{error}}</p>
    <button type="submit">Sign Up</button>
    <a routerLink="/login">Go to Login Page</a>
</form>
