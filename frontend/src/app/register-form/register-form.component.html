<form (ngSubmit)="onSubmit()" id="register-form">
    <label for="name">Name</label>
    <input type="text" name="name" id="name" [(ngModel)]="name" required>
    <label for="username">Username</label>
    <input type="text" name="username" id="username" [(ngModel)]="username" required>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" [(ngModel)]="email" required>
    <label for="password">Password</label>
    <input type="password" name="password" id="password" [(ngModel)]="password" required minlength="8">
    <p class="error" *ngIf="">{{error}}</p>
    <button type="submit">Sign Up</button>
    <a routerLink="/login">Go to Login Page</a>
</form>
